<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Move Mountains Co. — Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --navy:#161410;
    --navy-light:#3a3428;
    --gold:#c9a227;
    --gold-light:#e9d68a;
    --bg:#f4f4f2;
    --card:#ffffff;
    --ink:#111111;
    --muted:#666666;
    --line:#e4e2dc;
    --good:#8a6d00;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    font-family:'Helvetica Neue', Arial, sans-serif;
    background:var(--bg);
    color:var(--ink);
  }
  .app{
    display:flex;
    min-height:100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:250px;
    flex-shrink:0;
    background:linear-gradient(180deg, var(--navy) 0%, var(--navy-light) 100%);
    color:#fff;
    padding:28px 20px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .brand{
    text-transform:uppercase;
    letter-spacing:2px;
    font-size:11px;
    color:var(--gold-light);
    font-weight:700;
    margin-bottom:4px;
  }
  .brand-sub{
    font-size:13px;
    color:#c9c4b3;
    margin-bottom:28px;
  }
  .nav-section-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:#8a8477;
    font-weight:600;
    margin:18px 0 8px;
  }
  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:11px 12px;
    border-radius:8px;
    color:#e8e4da;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    margin-bottom:4px;
    border:1px solid transparent;
  }
  .nav-item:hover{
    background:rgba(255,255,255,0.06);
  }
  .nav-item.active{
    background:rgba(201,162,39,0.15);
    border:1px solid rgba(201,162,39,0.4);
    color:#fff;
  }
  .nav-dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--gold);
    flex-shrink:0;
  }
  .nav-item.disabled{
    opacity:0.45;
    cursor:default;
  }
  .nav-item.disabled:hover{
    background:transparent;
  }
  .nav-footer{
    margin-top:32px;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,0.1);
    font-size:11px;
    color:#8a8477;
    line-height:1.5;
  }

  /* ---------- Main content ---------- */
  .main{
    flex:1;
    padding:40px 44px;
    max-width:1000px;
  }
  .report{
    display:none;
  }
  .report.active{
    display:block;
  }

  .placeholder{
    border:1px dashed var(--line);
    border-radius:14px;
    padding:60px 40px;
    text-align:center;
    color:var(--muted);
    background:#fbfaf8;
  }
  .placeholder h2{
    color:var(--ink);
    font-size:20px;
    margin:0 0 8px;
  }
  .placeholder p{
    font-size:14px;
    max-width:420px;
    margin:0 auto;
  }

  /* ---------- Report: shared card styles ---------- */
  .sheet{
    max-width:860px;
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(15,31,51,0.08);
  }
  .header{
    background:linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color:#fff;
    padding:44px 48px 36px;
    position:relative;
  }
  .header::after{
    content:"";
    position:absolute;
    bottom:0; left:0; right:0;
    height:4px;
    background:linear-gradient(90deg, var(--gold), var(--gold-light));
  }
  .eyebrow{
    text-transform:uppercase;
    letter-spacing:2px;
    font-size:11px;
    color:var(--gold-light);
    font-weight:600;
    margin-bottom:10px;
  }
  .header h1{
    margin:0 0 6px;
    font-size:28px;
    font-weight:700;
    letter-spacing:-0.3px;
  }
  .header p{
    margin:0;
    color:#c9c4b3;
    font-size:14px;
  }
  .meta-row{
    display:flex;
    gap:28px;
    margin-top:22px;
    flex-wrap:wrap;
  }
  .meta-item{
    font-size:12px;
    color:#c9c4b3;
  }
  .meta-item strong{
    display:block;
    color:#fff;
    font-size:14px;
    margin-top:2px;
  }

  .hero{
    padding:36px 48px 8px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:20px;
    border-bottom:1px solid var(--line);
    padding-bottom:32px;
  }
  .hero-label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--muted);
    font-weight:600;
    margin-bottom:6px;
  }
  .hero-number{
    font-size:40px;
    font-weight:700;
    color:var(--navy);
    letter-spacing:-1px;
  }
  .hero-sub{
    font-size:13px;
    color:var(--muted);
    margin-top:4px;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#faf3d9;
    color:var(--good);
    font-size:12px;
    font-weight:600;
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--gold-light);
  }

  .section{
    padding:32px 48px;
  }
  .section-title{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--navy);
    font-weight:700;
    margin:0 0 20px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-title::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }

  .breakdown-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:14px;
  }
  .cat-card{
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px;
    background:#fbfaf8;
  }
  .cat-name{
    font-size:12px;
    color:var(--muted);
    font-weight:600;
    margin-bottom:8px;
  }
  .cat-amount{
    font-size:22px;
    font-weight:700;
    color:var(--navy);
    margin-bottom:10px;
  }
  .bar-track{
    height:6px;
    background:var(--line);
    border-radius:99px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background:linear-gradient(90deg, var(--gold), var(--navy-light));
    border-radius:99px;
  }
  .cat-pct{
    font-size:11px;
    color:var(--muted);
    margin-top:6px;
